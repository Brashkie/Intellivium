name: CI

env:
  DEBUG: napi:*
  APP_NAME: intellivium
  MACOSX_DEPLOYMENT_TARGET: '10.13'
  CARGO_INCREMENTAL: '1'

permissions:
  contents: write
  id-token: write

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
    paths-ignore:
      - '**/*.md'
      - LICENSE
      - '**/*.gitignore'
      - .editorconfig
      - docs/**
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────
  # Rust unit tests (fail fast)
  # ───────────────────────────────────────────────────────────────
  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy (core)
        run: cargo clippy -p neuroforge-core -- -D warnings
      - name: test (excluding NAPI bindings)
        run: cargo test --workspace --exclude neuroforge-napi --verbose

  # ───────────────────────────────────────────────────────────────
  # Node checks: lint · typecheck · coverage
  # ───────────────────────────────────────────────────────────────
  node-checks:
    name: Node checks
    needs: rust-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npm run typecheck
      - name: build (native + ts)
        run: npm run build
      - name: coverage
        run: npm run coverage

  # ───────────────────────────────────────────────────────────────
  # Build native binaries for all platforms
  # ───────────────────────────────────────────────────────────────
  build:
    needs: rust-test
    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS
          - host: macos-latest
            target: x86_64-apple-darwin
            build: npm run build:native -- --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: npm run build:native -- --target aarch64-apple-darwin

          # Windows
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build:native -- --target x86_64-pc-windows-msvc
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: npm run build:native -- --target aarch64-pc-windows-msvc

          # Linux x64 GNU (Debian)
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            build: |
              rustup update stable
              npm run build:native -- --target x86_64-unknown-linux-gnu

          # Linux x64 musl (Alpine)
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: |
              rustup update stable
              npm run build:native -- --target x86_64-unknown-linux-musl

          # Linux ARM64 GNU
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
            build: |
              apt-get update && apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
              rustup update stable
              rustup target add aarch64-unknown-linux-gnu
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
              export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
              npm run build:native -- --target aarch64-unknown-linux-gnu

          # ─── Android (opcional: borra estas 2 entradas si no lo necesitas) ───
          - host: ubuntu-latest
            target: aarch64-linux-android
            build: |
              export ANDROID_NDK_HOME="${ANDROID_NDK_LATEST_HOME}"
              export PATH="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin:${PATH}"
              export CC_aarch64_linux_android=aarch64-linux-android24-clang
              export CXX_aarch64_linux_android=aarch64-linux-android24-clang++
              export AR_aarch64_linux_android=llvm-ar
              export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=aarch64-linux-android24-clang
              rustup target add aarch64-linux-android
              npm run build:native -- --target aarch64-linux-android
          - host: ubuntu-latest
            target: armv7-linux-androideabi
            build: |
              export ANDROID_NDK_HOME="${ANDROID_NDK_LATEST_HOME}"
              export PATH="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin:${PATH}"
              export CC_armv7_linux_androideabi=armv7a-linux-androideabi24-clang
              export CXX_armv7_linux_androideabi=armv7a-linux-androideabi24-clang++
              export AR_armv7_linux_androideabi=llvm-ar
              export CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=armv7a-linux-androideabi24-clang
              rustup target add armv7-linux-androideabi
              npm run build:native -- --target armv7-linux-androideabi

    name: stable - ${{ matrix.settings.target }} - node@20
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v4
        if: ${{ !matrix.settings.docker }}
        with:
          node-version: 20
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.settings.docker }}
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - name: Install dependencies
        if: ${{ !matrix.settings.docker }}
        run: npm install
      - name: Build in docker
        uses: addnab/docker-run-action@v3
        if: ${{ matrix.settings.docker }}
        with:
          image: ${{ matrix.settings.docker }}
          options: '--user 0:0 -v ${{ github.workspace }}/.cargo-cache/git/db:/usr/local/cargo/git/db -v ${{ github.workspace }}/.cargo/registry/cache:/usr/local/cargo/registry/cache -v ${{ github.workspace }}/.cargo/registry/index:/usr/local/cargo/registry/index -v ${{ github.workspace }}:/build -w /build'
          run: |
            npm install
            ${{ matrix.settings.build }}
      - name: Build
        run: ${{ matrix.settings.build }}
        if: ${{ !matrix.settings.docker }}
        shell: bash
      - name: List built files
        run: ls -la *.node || echo "No .node files found"
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ${{ env.APP_NAME }}.*.node
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────
  # Security audit
  # ───────────────────────────────────────────────────────────────
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit || true
      - name: Audit dependencies
        run: cargo audit --deny warnings
