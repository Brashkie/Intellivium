name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rust:
    name: Rust core (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy -p neuroforge-core -- -D warnings
      - name: test
        run: cargo test -p neuroforge-core

  node:
    name: Node (build · lint · coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npm run typecheck
      - name: build native + ts
        run: npm run build
      - name: coverage
        run: npm run coverage
      - name: upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
